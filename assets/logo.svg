<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0f19;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111625;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8DB4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A7BDF5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="8" y="8" width="240" height="240" rx="32" fill="url(#bg-grad)" stroke="url(#border-grad)" stroke-width="4"/>

  <!-- Terminal prompt -->
  <text x="42" y="100" font-family="monospace" font-size="28" fill="#8DB4FF" font-weight="bold">user@host</text>
  <text x="42" y="140" font-family="monospace" font-size="28" fill="#AAB6D6">:</text>
  <text x="52" y="140" font-family="monospace" font-size="28" fill="#4ade80">~</text>
  <text x="74" y="140" font-family="monospace" font-size="28" fill="#AAB6D6">$</text>

  <!-- Blinking cursor -->
  <rect x="90" y="116" width="6" height="26" rx="2" fill="#E6ECFF">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
  </rect>

  <!-- Network bars -->
  <rect x="42" y="168" width="16" height="8" rx="2" fill="#4ade80" opacity="0.6"/>
  <rect x="46" y="160" width="8" height="16" rx="2" fill="#4ade80" opacity="0.8"/>
  <rect x="50" y="152" width="4" height="24" rx="2" fill="#4ade80" opacity="1.0"/>

  <!-- Bluetooth icon -->
  <text x="90" y="190" font-family="monospace" font-size="22" fill="#8DB4FF">󰂯</text>

  <!-- Signal -->
  <text x="138" y="190" font-family="monospace" font-size="22" fill="#A7BDF5">📶</text>

  <!-- Grid dots -->
  <circle cx="190" cy="174" r="4" fill="#8DB4FF" opacity="0.5"/>
  <circle cx="206" cy="174" r="4" fill="#8DB4FF" opacity="0.5"/>
  <circle cx="190" cy="190" r="4" fill="#8DB4FF" opacity="0.5"/>
  <circle cx="206" cy="190" r="4" fill="#8DB4FF" opacity="0.5"/>

  <!-- Title -->
  <text x="128" y="220" font-family="monospace" font-size="14" fill="#AAB6D6" text-anchor="middle"
        letter-spacing="2">TERMINAL-ESSENTIALS</text>
</svg>
